<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>BC Fleet</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div id="app">

  <div id="screen-identity" class="screen active">
    <div class="identity-wrap">
      <div class="bc-logo-wrap">
        <div class="bc-logo-circle">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <text x="4" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" font-weight="bold" fill="white" letter-spacing="-2">be</text>
          </svg>
        </div>
        <div class="bc-wordmark">Be<span>Copenhagen</span></div>
        <div class="bc-sub-label">Fleet</div>
      </div>
      <p class="identity-prompt">Who are you?</p>
      <div id="identity-grid" class="identity-grid"></div>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <text x="4" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" font-weight="bold" fill="white" letter-spacing="-2">be</text>
          </svg>
        </div>
        <span id="view-title" class="view-title">Fleet</span>
      </div>
      <div class="topbar-right">
        <span id="actor-badge" class="actor-badge"></span>
        <button class="icon-btn" id="btn-undo" title="Nothing to undo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="icon-btn" id="btn-switch-user" title="Switch user">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
      </div>
    </header>
    <div id="toast" class="toast hidden"></div>
    <nav class="tabbar" id="tabbar"></nav>
    <main class="content" id="content"></main>
  </div>

</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modal-close">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
